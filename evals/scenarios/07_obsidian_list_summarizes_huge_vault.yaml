name: obsidian_list_summarizes_huge_vault
description: |
  Regression target: 'show me a list of notes' in a vault with hundreds
  of paths used to return all paths as a single huge string. That blob
  overflowed the agent's max_block_chars on subsequent turns; the model
  reported '[clipped]' and told the user it couldn't retrieve the list.

  Fix in ambi/skills/obsidian/tools.py: when >100 notes are in scope,
  obsidian_list returns a folder breakdown instead of every path.

  This scenario seeds a 150-note tmp vault and asserts the summary form.
setup:
  env:
    OBSIDIAN_VAULT: "{tmp_dir}/vault"
  prepare:
    - create_obsidian_notes:
        count: 150
        folders: [Inbox, Areas/Work, Resources/Reading]
input: "use obsidian_list to show what's in my vault — give me a summary not every path"
assert:
  - tool_called: obsidian_list
  # No "[clipped]" / "cannot retrieve" symptom from the old bug.
  - text_not_matches: "(?i)clipped|cannot retrieve|truncated"
  # Mentions a count consistent with summary mode (we seeded 150 notes).
  - text_matches: "150|hundred|many"
  # Names at least two of the seeded folders (agent summarised the breakdown).
  - text_matches: '(?s)Inbox.*(Areas|Resources)|Areas.*(Inbox|Resources)|Resources.*(Inbox|Areas)'
  # Does NOT enumerate every note path verbatim.
  - text_not_matches: "note_\\d{4}\\.md.*note_\\d{4}\\.md.*note_\\d{4}\\.md"
